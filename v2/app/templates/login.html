<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Ghostwriter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-brand">
            <span class="brand-icon">G</span>
            <span class="brand-text">Ghostwriter</span>
        </div>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/ui/login" class="login-form">
            <label class="login-label" for="api_key">API Key</label>
            <input type="password" name="api_key" id="api_key" class="login-input" placeholder="gw_..." autofocus required>
            <button type="submit" class="login-button">Sign In</button>
        </form>
    </div>
</body>
</html>
