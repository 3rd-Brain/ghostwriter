
<!DOCTYPE html>
<html>
<head>
    <title>Create Generation Flow</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        .step-form {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .message-form {
            background: #ffffff;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .step-navigation {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .message-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
        }
        textarea {
            min-height: 100px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        {% include 'search_sidebar.html' %}
        <div class="content-area">
            <h2>Create New Generation Flow</h2>
            
            <!-- Initial Flow Details -->
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <label for="workflowId">Workflow ID:</label>
                        <input type="text" id="workflowId" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="workflowType">Workflow Type:</label>
                        <select id="workflowType" class="form-control" required>
                            <option value="short_form_social">Short Form Social</option>
                            <option value="atomic_essay">Atomic Essay</option>
                            <option value="mid_form_social">Mid Form Social</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" class="form-control" required></textarea>
                </div>
            </div>

            <!-- Steps Container -->
            <div id="stepsContainer"></div>

            <!-- Step Navigation -->
            <div class="step-navigation">
                <button onclick="previousStep()" class="btn">Previous Step</button>
                <button onclick="addStep()" class="btn">Add New Step</button>
                <button onclick="nextStep()" class="btn">Next Step</button>
            </div>

            <!-- Upload Button -->
            <div class="form-actions">
                <button onclick="uploadFlow()" class="submit-btn">Upload Flow</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 0;
        let steps = [];

        function createStep(index) {
            return {
                Step_name: '',
                Model: 'claude-3-5-sonnet-20241022',
                System_prompt: '',
                Max_tokens: 4096,
                Order: index + 1,
                Temperature: 0.8,
                Message: []
            };
        }

        function addStep() {
            steps.push(createStep(steps.length));
            renderCurrentStep();
        }

        function addMessage(stepIndex) {
            steps[stepIndex].Message.push({
                role: 'user',
                content: ''
            });
            renderCurrentStep();
        }

        function removeMessage(messageIndex) {
            steps[currentStep].Message.splice(messageIndex, 1);
            renderCurrentStep();
        }

        function previousStep() {
            if (currentStep > 0) {
                currentStep--;
                renderCurrentStep();
            }
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                renderCurrentStep();
            }
        }

        function renderCurrentStep() {
            if (steps.length === 0) {
                document.getElementById('stepsContainer').innerHTML = '<p>No steps added yet.</p>';
                return;
            }

            const step = steps[currentStep];
            let html = `
                <div class="step-form">
                    <h3>Step ${currentStep + 1}</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Step Name:</label>
                            <input type="text" value="${step.Step_name}" onchange="updateStepField(${currentStep}, 'Step_name', this.value)" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Model:</label>
                            <input type="text" value="${step.Model}" onchange="updateStepField(${currentStep}, 'Model', this.value)" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>System Prompt:</label>
                        <textarea onchange="updateStepField(${currentStep}, 'System_prompt', this.value)" class="form-control">${step.System_prompt}</textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Max Tokens:</label>
                            <input type="number" value="${step.Max_tokens}" onchange="updateStepField(${currentStep}, 'Max_tokens', parseInt(this.value))" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Temperature:</label>
                            <input type="number" step="0.1" value="${step.Temperature}" onchange="updateStepField(${currentStep}, 'Temperature', parseFloat(this.value))" class="form-control">
                        </div>
                    </div>

                    <h4>Messages</h4>
                    ${step.Message.map((msg, msgIndex) => `
                        <div class="message-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Role:</label>
                                    <select onchange="updateMessageField(${currentStep}, ${msgIndex}, 'role', this.value)" class="form-control">
                                        <option value="user" ${msg.role === 'user' ? 'selected' : ''}>User</option>
                                        <option value="assistant" ${msg.role === 'assistant' ? 'selected' : ''}>Assistant</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Content:</label>
                                <textarea onchange="updateMessageField(${currentStep}, ${msgIndex}, 'content', this.value)" class="form-control">${msg.content}</textarea>
                            </div>
                            <div class="message-actions">
                                <button onclick="removeMessage(${msgIndex})" class="btn">Remove Message</button>
                            </div>
                        </div>
                    `).join('')}
                    
                    <button onclick="addMessage(${currentStep})" class="btn">Add Message</button>
                </div>
            `;

            document.getElementById('stepsContainer').innerHTML = html;
        }

        function updateStepField(stepIndex, field, value) {
            steps[stepIndex][field] = value;
        }

        function updateMessageField(stepIndex, messageIndex, field, value) {
            steps[stepIndex].Message[messageIndex][field] = value;
        }

        function uploadFlow() {
            const flowConfig = {
                workflow_id: document.getElementById('workflowId').value,
                workflow_type: document.getElementById('workflowType').value,
                description: document.getElementById('description').value,
                steps: steps
            };
            
            // Placeholder for API endpoint
            console.log('Flow configuration:', flowConfig);
            // TODO: Implement API call when endpoint is provided
        }

        // Initialize with one step
        addStep();
    </script>
</body>
</html>
