{% extends "base.html" %}

{% block title %}Create Generation Flow{% endblock %}

{% block content %}
<h2>Create New Generation Flow</h2>
<div class="content-card wide">
    <div class="form-container">
        <form class="generation-form">
            <div class="form-group">
                <label for="workflowId">Workflow ID:</label>
                <input type="text" id="workflowId" class="form-control" placeholder="Enter a unique identifier">
            </div>
            <div class="form-group">
                <label for="workflowType">Workflow Type:</label>
                <select id="workflowType" class="form-control">
                    <option value="social">Social Media</option>
                    <option value="email">Email</option>
                    <option value="blog">Blog</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            <div class="form-group">
                <label for="workflowDescription">Description:</label>
                <textarea id="workflowDescription" class="form-control" rows="3" placeholder="Describe what this workflow does"></textarea>
            </div>

            <div id="stepsContainer">
                <h3>Workflow Steps</h3>
                <div class="workflow-step" data-step="1">
                    <h4>Step 1</h4>
                    <div class="form-group">
                        <label>Step Name:</label>
                        <input type="text" class="step-name form-control" placeholder="e.g., Initial Generation">
                    </div>
                    <div class="form-group">
                        <label>Model:</label>
                        <select class="step-model form-control">
                            <option value="claude-3-5-sonnet-20240229">Claude 3.5 Sonnet</option>
                            <option value="claude-3-opus-20240229">Claude 3 Opus</option>
                            <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>System Prompt:</label>
                        <textarea class="step-system-prompt form-control" rows="5" placeholder="Instructions for the AI"></textarea>
                    </div>
                    <div class="form-group">
                        <label>User Message:</label>
                        <textarea class="step-user-message form-control" rows="5" placeholder="Use {template}, {content_chunks}, {brand_voice}, and {prev_ai_output} as variables"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-col">
                            <label>Temperature:</label>
                            <input type="number" class="step-temperature form-control" value="0.7" min="0" max="1" step="0.1">
                        </div>
                        <div class="form-col">
                            <label>Max Tokens:</label>
                            <input type="number" class="step-max-tokens form-control" value="1000" min="100" max="4000">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group action-buttons">
                <button type="button" onclick="addStep()" class="secondary-btn">Add Step</button>
                <button type="button" onclick="saveWorkflow()" class="submit-btn">Save Workflow</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let stepCount = 1;

    function addStep() {
        stepCount++;
        const newStep = document.createElement('div');
        newStep.className = 'workflow-step';
        newStep.dataset.step = stepCount;

        newStep.innerHTML = `
            <h4>Step ${stepCount}</h4>
            <div class="form-group">
                <label>Step Name:</label>
                <input type="text" class="step-name form-control" placeholder="e.g., Refinement">
            </div>
            <div class="form-group">
                <label>Model:</label>
                <select class="step-model form-control">
                    <option value="claude-3-5-sonnet-20240229">Claude 3.5 Sonnet</option>
                    <option value="claude-3-opus-20240229">Claude 3 Opus</option>
                    <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                </select>
            </div>
            <div class="form-group">
                <label>System Prompt:</label>
                <textarea class="step-system-prompt form-control" rows="5" placeholder="Instructions for the AI"></textarea>
            </div>
            <div class="form-group">
                <label>User Message:</label>
                <textarea class="step-user-message form-control" rows="5" placeholder="Use {template}, {content_chunks}, {brand_voice}, and {prev_ai_output} as variables"></textarea>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label>Temperature:</label>
                    <input type="number" class="step-temperature form-control" value="0.7" min="0" max="1" step="0.1">
                </div>
                <div class="form-col">
                    <label>Max Tokens:</label>
                    <input type="number" class="step-max-tokens form-control" value="1000" min="100" max="4000">
                </div>
            </div>
            <button type="button" onclick="removeStep(${stepCount})" class="remove-btn">Remove Step</button>
        `;

        document.getElementById('stepsContainer').appendChild(newStep);
    }

    function removeStep(stepNum) {
        const stepToRemove = document.querySelector(`.workflow-step[data-step="${stepNum}"]`);
        if (stepToRemove) {
            stepToRemove.remove();
        }
    }

    async function saveWorkflow() {
        // Build the workflow configuration from form values
        const workflowId = document.getElementById('workflowId').value;
        const workflowType = document.getElementById('workflowType').value;
        const description = document.getElementById('workflowDescription').value;
        const stepsData = [];

        const steps = document.querySelectorAll('.workflow-step');
        steps.forEach(step => {
            const stepName = step.querySelector('.step-name').value;
            const model = step.querySelector('.step-model').value;
            const systemPrompt = step.querySelector('.step-system-prompt').value;
            const userMessage = step.querySelector('.step-user-message').value;
            const temperature = parseFloat(step.querySelector('.step-temperature').value);
            const maxTokens = parseInt(step.querySelector('.step-max-tokens').value);
            stepsData.push({stepName, model, systemPrompt, userMessage, temperature, maxTokens});
        });


        if (!workflowId || !workflowType || !description || stepsData.length ===0) {
            alert('Please fill out all required fields');
            return;
        }

        const formData = {
            workflowId,
            workflowType,
            description,
            steps: stepsData
        };

        console.log(JSON.stringify(formData, null, 2));

        try {
            const response = await fetch('/api/generation-flow', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                alert('Workflow saved successfully!');
            } else {
                alert('Failed to save workflow. Status: ' + response.status);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred while saving the workflow.');
        }
    }
</script>
{% endblock %}
