
<!DOCTYPE html>
<html>
<head>
    <title>Create Generation Flow</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        .step-form {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .message-form {
            background: #ffffff;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .step-navigation {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        .message-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
        }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        textarea {
            min-height: 100px;
            width: 100%;
        }
        .steps-counter {
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="main-container">
        {% include 'search_sidebar.html' %}
        <div class="content-area">
            <h2>Create New Generation Flow</h2>
            <form id="generationFlowForm">
                <!-- Initial Flow Details -->
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="workflowId">Workflow ID:</label>
                            <input type="text" id="workflowId" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="workflowType">Workflow Type:</label>
                            <select id="workflowType" class="form-control" required>
                                <option value="short_form_social">Short Form Social</option>
                                <option value="atomic_essay">Atomic Essay</option>
                                <option value="mid_form_social">Mid Form Social</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">Description:</label>
                        <textarea id="description" class="form-control" required></textarea>
                    </div>
                </div>

                <!-- Steps Container -->
                <div id="stepsContainer">
                    <!-- Steps will be added here dynamically -->
                </div>

                <!-- Step Navigation -->
                <div class="steps-counter">Step <span id="currentStep">1</span> of <span id="totalSteps">1</span></div>
                <div class="step-navigation">
                    <button type="button" id="prevStep" class="submit-btn" style="display: none;">Previous Step</button>
                    <button type="button" id="nextStep" class="submit-btn">Next Step</button>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button type="button" id="addStep" class="submit-btn">Add New Step</button>
                    <button type="submit" class="submit-btn">Save Generation Flow</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentStepIndex = 0;
        let steps = [{
            stepName: '',
            model: 'claude-3-5-sonnet-20241022',
            systemPrompt: '',
            maxTokens: 4096,
            order: 1,
            temperature: 0.8,
            messages: [{
                role: 'user',
                content: ''
            }]
        }];

        function createStepForm(step, index) {
            return `
                <div class="step-form" data-step="${index}">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="stepName${index}">Step Name:</label>
                            <input type="text" id="stepName${index}" class="form-control" value="${step.stepName}" required>
                        </div>
                        <div class="form-group">
                            <label for="model${index}">Model:</label>
                            <input type="text" id="model${index}" class="form-control" value="${step.model}" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="systemPrompt${index}">System Prompt:</label>
                        <textarea id="systemPrompt${index}" class="form-control" required>${step.systemPrompt}</textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="maxTokens${index}">Max Tokens:</label>
                            <input type="number" id="maxTokens${index}" class="form-control" value="${step.maxTokens}" required>
                        </div>
                        <div class="form-group">
                            <label for="order${index}">Order:</label>
                            <input type="number" id="order${index}" class="form-control" value="${step.order}" required>
                        </div>
                        <div class="form-group">
                            <label for="temperature${index}">Temperature:</label>
                            <input type="number" id="temperature${index}" class="form-control" value="${step.temperature}" step="0.1" min="0" max="1" required>
                        </div>
                    </div>
                    <div id="messagesContainer${index}">
                        ${step.messages.map((msg, msgIndex) => createMessageForm(index, msgIndex, msg)).join('')}
                    </div>
                    <button type="button" class="submit-btn" onclick="addMessage(${index})">Add Message</button>
                </div>
            `;
        }

        function createMessageForm(stepIndex, messageIndex, message) {
            return `
                <div class="message-form" data-message="${messageIndex}">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="messageRole${stepIndex}_${messageIndex}">Role:</label>
                            <select id="messageRole${stepIndex}_${messageIndex}" class="form-control" required>
                                <option value="user" ${message.role === 'user' ? 'selected' : ''}>User</option>
                                <option value="assistant" ${message.role === 'assistant' ? 'selected' : ''}>Assistant</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="messageContent${stepIndex}_${messageIndex}">Content:</label>
                        <textarea id="messageContent${stepIndex}_${messageIndex}" class="form-control" required>${message.content}</textarea>
                    </div>
                    <div class="message-actions">
                        <button type="button" class="submit-btn" onclick="removeMessage(${stepIndex}, ${messageIndex})">Remove Message</button>
                    </div>
                </div>
            `;
        }

        function updateStepVisibility() {
            document.querySelectorAll('.step-form').forEach((step, index) => {
                step.style.display = index === currentStepIndex ? 'block' : 'none';
            });
            
            document.getElementById('currentStep').textContent = currentStepIndex + 1;
            document.getElementById('totalSteps').textContent = steps.length;
            
            document.getElementById('prevStep').style.display = currentStepIndex > 0 ? 'block' : 'none';
            document.getElementById('nextStep').style.display = currentStepIndex < steps.length - 1 ? 'block' : 'none';
        }

        function addStep() {
            const newStep = {
                stepName: '',
                model: 'claude-3-5-sonnet-20241022',
                systemPrompt: '',
                maxTokens: 4096,
                order: steps.length + 1,
                temperature: 0.8,
                messages: [{
                    role: 'user',
                    content: ''
                }]
            };
            steps.push(newStep);
            
            const stepsContainer = document.getElementById('stepsContainer');
            stepsContainer.insertAdjacentHTML('beforeend', createStepForm(newStep, steps.length - 1));
            updateStepVisibility();
        }

        function addMessage(stepIndex) {
            const newMessage = {
                role: 'user',
                content: ''
            };
            steps[stepIndex].messages.push(newMessage);
            
            const messagesContainer = document.getElementById(`messagesContainer${stepIndex}`);
            messagesContainer.insertAdjacentHTML('beforeend', 
                createMessageForm(stepIndex, steps[stepIndex].messages.length - 1, newMessage)
            );
        }

        function removeMessage(stepIndex, messageIndex) {
            if (steps[stepIndex].messages.length > 1) {
                steps[stepIndex].messages.splice(messageIndex, 1);
                const messageElement = document.querySelector(
                    `#messagesContainer${stepIndex} .message-form[data-message="${messageIndex}"]`
                );
                messageElement.remove();
            }
        }

        // Initialize the first step
        document.getElementById('stepsContainer').innerHTML = createStepForm(steps[0], 0);
        updateStepVisibility();

        // Event Listeners
        document.getElementById('addStep').addEventListener('click', addStep);
        
        document.getElementById('prevStep').addEventListener('click', () => {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                updateStepVisibility();
            }
        });

        document.getElementById('nextStep').addEventListener('click', () => {
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                updateStepVisibility();
            }
        });

        document.getElementById('generationFlowForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Collect all form data
            const formData = {
                workflowId: document.getElementById('workflowId').value,
                workflowType: document.getElementById('workflowType').value,
                description: document.getElementById('description').value,
                steps: steps.map((step, index) => ({
                    Step_name: document.getElementById(`stepName${index}`).value,
                    Model: document.getElementById(`model${index}`).value,
                    System_prompt: document.getElementById(`systemPrompt${index}`).value,
                    Max_tokens: parseInt(document.getElementById(`maxTokens${index}`).value),
                    Order: parseInt(document.getElementById(`order${index}`).value),
                    Temperature: parseFloat(document.getElementById(`temperature${index}`).value),
                    Message: Array.from(document.getElementById(`messagesContainer${index}`).children).map((msgElem, msgIndex) => ({
                        role: document.getElementById(`messageRole${index}_${msgIndex}`).value,
                        content: document.getElementById(`messageContent${index}_${msgIndex}`).value
                    }))
                }))
            };

            try {
                const response = await fetch('/api/generation-flow', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('Generation flow saved successfully!');
                } else {
                    alert('Failed to save generation flow');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving generation flow');
            }
        });
    </script>
</body>
</html>
