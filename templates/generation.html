
<!DOCTYPE html>
<html>
<head>
    <title>Generation</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-nav">
                <a href="/dashboard" class="sidebar-btn">
                    <span class="material-icons">home</span>
                    Home
                </a>
                <div class="nav-item">
                    <a href="/generation" class="sidebar-btn active">
                        <span class="material-icons">auto_awesome</span>
                        Generation
                    </a>
                    <div class="submenu">
                        <a href="#" class="submenu-item">Repurpose a Piece</a>
                        <a href="#" class="submenu-item">Repurpose Top Content</a>
                        <a href="#" class="submenu-item">Repurpose Content Using Tweets as Templates</a>
                    </div>
                </div>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">search</span>
                    Search
                </a>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">upload</span>
                    Create/Upload
                </a>
            </div>
            <a href="#" class="user-profile">
                <div class="user-avatar">
                    <span class="material-icons">person</span>
                </div>
                <div class="user-info">
                    <div class="user-name">{{ username }}</div>
                </div>
            </a>
        </div>
        <div class="content-area">
            <h2>Content Generation</h2>
            <div id="content-container">
                <!-- Content will be dynamically loaded -->
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const generationBtn = document.querySelector('.sidebar-btn.active');
            const submenu = document.querySelector('.submenu');
            
            // Toggle submenu on Generation button click
            generationBtn.addEventListener('click', function(e) {
                e.preventDefault();
                this.classList.toggle('clicked');
            });

            // Handle submenu item clicks
            document.querySelectorAll('.submenu-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (this.textContent === 'Repurpose a Piece') {
                        document.querySelector('#content-container').innerHTML = `
                            <h3>Repurpose a Piece</h3>
                            <div class="form-group">
                                <label for="content">Content to Repurpose:</label>
                                <textarea id="content" rows="6" class="form-control"></textarea>
                            </div>
                            <button type="submit" class="submit-btn">Generate</button>
                        `;
                    }
                });
            });
        });
    </script>
</body>
</html>
