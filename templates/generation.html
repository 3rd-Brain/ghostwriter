
<!DOCTYPE html>
<html>
<head>
    <title>Generation - Repurpose</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-nav">
                <a href="/dashboard" class="sidebar-btn">
                    <span class="material-icons">home</span>
                    Home
                </a>
                <div class="nav-item">
                    <a href="/generation/repurpose" class="sidebar-btn active">
                        <span class="material-icons">auto_awesome</span>
                        Generation
                    </a>
                    <div class="submenu">
                        <a href="#" class="submenu-item">Repurpose a Piece</a>
                        <a href="#" class="submenu-item">Repurpose Top Content</a>
                        <a href="#" class="submenu-item">Repurpose Content Using Tweets as Templates</a>
                    </div>
                </div>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">search</span>
                    Search
                </a>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">upload</span>
                    Create/Upload
                </a>
            </div>
            <a href="#" class="user-profile">
                <div class="user-avatar">
                    <span class="material-icons">person</span>
                </div>
                <div class="user-info">
                    <div class="user-name">{{ username }}</div>
                </div>
            </a>
        </div>
        <div class="content-area">
            <h2>Content Generation</h2>
            <div class="content-card">
                <div class="form-container">
                    <h3>Repurpose a Piece</h3>
                    <form id="repurposeForm" class="generation-form">
                        <div class="form-group">
                            <label for="topic">Topic/Content:</label>
                            <textarea id="topic" name="topic" rows="6" class="form-control" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="brand">Brand:</label>
                            <input type="text" id="brand" name="brand" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="repurposeCount">Repurpose Count:</label>
                            <input type="number" id="repurposeCount" name="repurposeCount" class="form-control" value="5" min="1" max="10" required>
                        </div>
                        <div class="form-group">
                            <label for="workflowId">Workflow ID:</label>
                            <input type="text" id="workflowId" name="workflowId" class="form-control" value="Legacy Generation Flow with Claude">
                        </div>
                    </form>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" form="repurposeForm" class="submit-btn">Generate Content</button>
                <button type="button" class="reset-btn">Reset</button>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const generationBtn = document.querySelector('.sidebar-btn.active');
            const submenu = document.querySelector('.submenu');
            
            generationBtn.addEventListener('click', function(e) {
                e.preventDefault();
                this.classList.toggle('clicked');
            });

            document.getElementById('repurposeForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = {
                    topic_query: document.getElementById('topic').value,
                    brand: document.getElementById('brand').value,
                    repurpose_count: parseInt(document.getElementById('repurposeCount').value),
                    workflow_id: document.getElementById('workflowId').value
                };

                try {
                    const response = await fetch('/repurpose', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });
                    const data = await response.json();
                    alert(data.status);
                } catch (error) {
                    alert('Error generating content: ' + error.message);
                }
            });

            document.querySelector('.reset-btn').addEventListener('click', function() {
                document.getElementById('topic').value = '';
                document.getElementById('brand').value = '';
                document.getElementById('repurposeCount').value = '5';
                document.getElementById('workflowId').value = 'Legacy Generation Flow with Claude';
            });
        });
    </script>
</body>
</html>
