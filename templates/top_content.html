
<!DOCTYPE html>
<html>
<head>
    <title>Generation - Top Content</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="main-container">
        {% include 'search_sidebar.html' %}
        <div class="content-area">
            <h2>Content Generation</h2>
            <div class="content-card">
                <div class="form-container">
                    <h3>Repurpose Top Content</h3>
                    <form id="topContentForm" class="generation-form">
                        <div class="form-group">
                            <label for="query">Search Query:</label>
                            <textarea id="query" name="query" rows="4" class="form-control" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="topic">Topic:</label>
                            <input type="text" id="topic" name="topic" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="brand">Brand:</label>
                            <input type="text" id="brand" name="brand" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="numberOfPosts">Number of Top Posts to Repurpose:</label>
                            <input type="number" id="numberOfPosts" name="numberOfPosts" class="form-control" value="5" min="1" max="10" required>
                        </div>
                        <div class="form-group">
                            <label for="repurposeCount">Times to Repurpose One Post:</label>
                            <input type="number" id="repurposeCount" name="repurposeCount" class="form-control" value="5" min="1" max="10" required>
                        </div>
                        <div class="form-group">
                            <label for="workflowId">Workflow ID:</label>
                            <input type="text" id="workflowId" name="workflowId" class="form-control" value="Legacy Generation Flow with Claude">
                        </div>
                    </form>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" form="topContentForm" class="submit-btn">Generate Content</button>
                <button type="button" class="reset-btn">Reset</button>
            </div>
        </div>
    </div>
    <div class="notification" id="notification"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(navItem => {
                const btn = navItem.querySelector('.sidebar-btn');
                const submenu = navItem.querySelector('.submenu');
                
                if (btn && submenu) {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        this.classList.toggle('clicked');
                        submenu.style.display = this.classList.contains('clicked') ? 'flex' : 'none';
                    });
                }
            });

            // Show submenu of active nav item initially
            const activeNavItem = document.querySelector('.nav-item .active');
            if (activeNavItem) {
                const parentNavItem = activeNavItem.closest('.nav-item');
                const parentBtn = parentNavItem.querySelector('.sidebar-btn');
                const parentSubmenu = parentNavItem.querySelector('.submenu');
                if (parentBtn && parentSubmenu) {
                    parentBtn.classList.add('clicked');
                    parentSubmenu.style.display = 'flex';
                }
            }

            document.getElementById('topContentForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = {
                    query: document.getElementById('query').value,
                    topic: document.getElementById('topic').value,
                    brand: document.getElementById('brand').value,
                    number_of_posts: parseInt(document.getElementById('numberOfPosts').value),
                    repurpose_count: parseInt(document.getElementById('repurposeCount').value),
                    workflow_id: document.getElementById('workflowId').value
                };

                try {
                    const response = await fetch('/top-content-repurposing', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });
                    const data = await response.json();
                    showNotification(data.status);
                } catch (error) {
                    showNotification('Error generating content: ' + error.message);
                }
            });

            document.querySelector('.reset-btn').addEventListener('click', function() {
                document.getElementById('query').value = '';
                document.getElementById('topic').value = '';
                document.getElementById('brand').value = '';
                document.getElementById('numberOfPosts').value = '5';
                document.getElementById('repurposeCount').value = '5';
                document.getElementById('workflowId').value = 'Legacy Generation Flow with Claude';
            });

            function showNotification(message) {
                const notification = document.getElementById('notification');
                notification.textContent = message;
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
            }
        });
    </script>
</body>
</html>
