
<!DOCTYPE html>
<html>
<head>
    <title>Search Published Content</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        .search-container {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }
        .search-container .form-group {
            flex: 1;
            margin: 0;
        }
        .search-container button {
            margin: 0;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .results-table th, .results-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .results-table th {
            background-color: #f5f5f5;
        }
        .content-card {
            padding: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="main-container">
        {% include 'search_sidebar.html' %}
        <div class="content-area">
            <h2>My Top Published Content</h2>
            <div class="content-card">
                <div class="form-container">
                    <form class="generation-form" onsubmit="searchContent(event)">
                        <div class="search-container">
                            <div class="form-group">
                                <label for="searchQuery">Search Query:</label>
                                <input type="text" id="searchQuery" class="form-control" placeholder="Enter search terms">
                            </div>
                            <button type="submit" class="submit-btn">Search</button>
                        </div>
                    </form>
                </div>
            </div>
            <div id="results" class="content-card" style="margin-top: 2rem;">
                <h3 id="resultsTitle">Showing Results for: "Top posts of the week"</h3>
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Content</th>
                            <th>Metrics</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="searchResults">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        async function searchContent(event) {
            if (event) event.preventDefault();
            const query = document.getElementById('searchQuery').value || "What are my top posts of the week?";
            document.getElementById('resultsTitle').textContent = `Showing Results for: "${query}"`;
            
            try {
                const response = await fetch('/top-content', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: query,
                        topic: "General"
                    })
                });
                
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayResults(data) {
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = '';
            
            if (data.data && data.data.documents) {
                data.data.documents.forEach(doc => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${doc.content}</td>
                        <td>
                            Impressions: ${(doc.metadata.weighted_impression_ratio || 0).toFixed(2)}<br>
                            Likes: ${(doc.metadata.weighted_like_ratio || 0).toFixed(2)}<br>
                            Total Weight: ${(doc.metadata.total_weight_metric || 0).toFixed(2)}
                        </td>
                        <td>${new Date(doc.metadata.published_date).toLocaleDateString()}</td>
                    `;
                    resultsContainer.appendChild(row);
                });
            }
        }

        // Initial load
        window.onload = () => searchContent();
    </script>
</body>
</html>
