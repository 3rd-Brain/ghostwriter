<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-nav">
                <a href="/dashboard" class="sidebar-btn active">
                    <span class="material-icons">home</span>
                    Home
                </a>
                <div class="nav-item">
                    <a href="#" class="sidebar-btn">
                        <span class="material-icons">auto_awesome</span>
                        Generation
                    </a>
                    <div class="submenu">
                        <a href="/generation/repurpose" class="submenu-item">Generate New Content</a>
                        <a href="/generation/top-content" class="submenu-item">Repurpose Top Content</a>
                        <a href="/generation/posts-templates" class="submenu-item">Repurpose Content Using Posts as Templates</a>
                    </div>
                </div>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">search</span>
                    Search
                </a>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">upload</span>
                    Create/Upload
                </a>
                <a href="/generated-content" class="sidebar-btn">
                    <span class="material-icons">article</span>
                    Generated Content
                </a>
            </div>
            <div class="nav-item">
                <button class="user-profile">
                    <div class="user-avatar">
                        <span class="material-icons">person</span>
                    </div>
                    <div class="user-info">
                        <div class="user-name">{{ username }}</div>
                    </div>
                </button>
            </div>
            <div class="nav-item">
                <button class="user-profile">
                    <div class="user-avatar">
                        <span class="material-icons">settings</span>
                    </div>
                    <div class="user-info">
                        <div class="user-name">Settings</div>
                    </div>
                </button>
            </div>
            <div class="nav-item">
                <a href="/logout" class="user-profile">
                    <div class="user-avatar">
                        <span class="material-icons">logout</span>
                    </div>
                    <div class="user-info">
                        <div class="user-name">Logout</div>
                    </div>
                </a>
            </div>
        </div>
        <div class="content-area">
            <div class="welcome-section">
                <h2>Welcome Back, {{ username }}</h2>
            </div>
        </div>
    </div>
    <script>
        function toggleProfileMenu() {
            const submenu = document.getElementById('profileSubmenu');
            submenu.style.display = submenu.style.display === 'flex' ? 'none' : 'flex';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const generationBtn = document.querySelector('.nav-item .sidebar-btn');
            const submenu = document.querySelector('.submenu');

            generationBtn.addEventListener('click', function(e) {
                e.preventDefault();
                this.classList.toggle('clicked');
                submenu.style.display = this.classList.contains('clicked') ? 'flex' : 'none';
            });

            // Close profile menu when clicking outside
            document.addEventListener('click', function(e) {
                const profileNav = document.querySelector('.profile-nav');
                const profileSubmenu = document.getElementById('profileSubmenu');
                if (!profileNav.contains(e.target)) {
                    profileSubmenu.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
