<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-nav">
                <a href="/dashboard" class="sidebar-btn active">
                    <span class="material-icons">home</span>
                    Home
                </a>
                <div class="nav-item">
                    <a href="#" class="sidebar-btn">
                        <span class="material-icons">auto_awesome</span>
                        Generation
                    </a>
                    <div class="submenu">
                        <a href="/generation/repurpose" class="submenu-item">Repurpose a Piece</a>
                        <a href="/generation/top-content" class="submenu-item">Repurpose Top Content</a>
                        <a href="#" class="submenu-item">Repurpose Content Using Tweets as Templates</a>
                    </div>
                </div>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">search</span>
                    Search
                </a>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">upload</span>
                    Create/Upload
                </a>
            </div>
            <a href="#" class="user-profile">
                <div class="user-avatar">
                    <span class="material-icons">person</span>
                </div>
                <div class="user-info">
                    <div class="user-name">{{ username }}</div>
                </div>
            </a>
        </div>
        <div class="content-area">
            <div class="welcome-section">
                <h2>Welcome Back, {{ username }}</h2>
                <div class="content">
                    <a href="/logout" class="logout-btn">Logout</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const generationBtn = document.querySelector('.nav-item .sidebar-btn');
            const submenu = document.querySelector('.submenu');

            generationBtn.addEventListener('click', function(e) {
                e.preventDefault();
                this.classList.toggle('clicked');
                submenu.style.display = this.classList.contains('clicked') ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
