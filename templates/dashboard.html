<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-nav">
                <a href="/dashboard" class="sidebar-btn active">
                    <span class="material-icons">home</span>
                    Home
                </a>
                <div class="nav-item">
                    <a href="#" class="sidebar-btn">
                        <span class="material-icons">auto_awesome</span>
                        Generation
                    </a>
                    <div class="submenu">
                        <a href="/generation/repurpose" class="submenu-item">Generate New Content</a>
                        <a href="/generation/top-content" class="submenu-item">Repurpose Top Content</a>
                        <a href="/generation/posts-templates" class="submenu-item">Repurpose Content Using Posts as Templates</a>
                    </div>
                </div>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">search</span>
                    Search
                </a>
                <a href="#" class="sidebar-btn">
                    <span class="material-icons">upload</span>
                    Create/Upload
                </a>
                <a href="/generated-content" class="sidebar-btn">
                    <span class="material-icons">article</span>
                    Generated Content
                </a>
            </div>
        </div>
        <div class="content-area">
            <div class="welcome-section">
                <h2>Welcome Back, {{ username }}</h2>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Generation submenu toggle
            const generationBtn = document.querySelector('.nav-item .sidebar-btn');
            const submenu = document.querySelector('.submenu');

            if (generationBtn && submenu) {
                generationBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    this.classList.toggle('clicked');
                    submenu.style.display = this.classList.contains('clicked') ? 'flex' : 'none';
                });
            }

            // Set active states based on current page
            const currentPath = window.location.pathname;
            const allLinks = document.querySelectorAll('.sidebar-btn, .submenu-item');
            
            allLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                    if (link.closest('.submenu')) {
                        link.closest('.nav-item').querySelector('.sidebar-btn').classList.add('clicked');
                        link.closest('.submenu').style.display = 'flex';
                    }
                }
            });
        });
    </script>
</body>
</html>
