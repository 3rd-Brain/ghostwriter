<!DOCTYPE html>
<html>
<head>
    <title>Upload Source Content</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="main-container">
        {% include 'search_sidebar.html' %}
        <div class="content-area">
            <h2>Upload Source Content</h2>
            <div class="content-card wide">
                <div class="form-container">
                    <div class="form-section">
                    <h3>Add reference content to your knowledge base</h3>
                    <form id="sourceContentForm" class="standard-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="contentTitle">Content Title</label>
                                <input type="text" id="contentTitle" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="contentType">Content Type</label>
                                <select id="contentType" class="form-control" required>
                                    <option value="">Select content type</option>
                                    <option value="Blog Post">Blog Post</option>
                                    <option value="White Paper">White Paper</option>
                                    <option value="Case Study">Case Study</option>
                                    <option value="Research Paper">Research Paper</option>
                                    <option value="Article">Article</option>
                                    <option value="Product Description">Product Description</option>
                                    <option value="Technical Documentation">Technical Documentation</option>
                                    <option value="Interview Transcript">Interview Transcript</option>
                                    <option value="Presentation">Presentation</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="contentTags">Content Tags (comma separated)</label>
                            <input type="text" id="contentTags" class="form-control" placeholder="e.g., AI, healthcare, innovation">
                        </div>
                        <div class="form-group">
                            <label for="contentText">Content Text</label>
                            <textarea id="contentText" class="form-control" rows="10" required placeholder="Paste your content here"></textarea>
                        </div>
                        <div class="action-buttons">
                            <button type="submit" class="submit-btn">Upload Content</button>
                        </div>
                    </form>
                </div>
                    <div id="formResult" class="hidden">
                        <h3>Content Uploaded!</h3>
                        <pre id="resultJson"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
