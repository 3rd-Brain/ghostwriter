
{% extends "base.html" %}

{% block title %}Upload Source Content{% endblock %}

{% block content %}
<h2>Upload Source Content</h2>
<div class="content-card wide">
    <div class="form-container">
        <div class="form-section">
            <h3>Add reference content to your knowledge base</h3>
            <form id="sourceContentForm" class="standard-form">
                <div class="form-row">
                    <div class="form-col">
                        <label for="contentTitle">Content Title:</label>
                        <input type="text" id="contentTitle" name="contentTitle" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="contentType">Content Type:</label>
                        <select id="contentType" name="contentType" required>
                            <option value="">Select Type</option>
                            <option value="article">Article</option>
                            <option value="blog">Blog Post</option>
                            <option value="research">Research</option>
                            <option value="whitepaper">Whitepaper</option>
                            <option value="case-study">Case Study</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="contentSource">Source:</label>
                        <input type="text" id="contentSource" name="contentSource">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="contentBody">Content Body:</label>
                        <textarea id="contentBody" name="contentBody" rows="10" required></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="contentTags">Tags (comma separated):</label>
                        <input type="text" id="contentTags" name="contentTags">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <button type="button" onclick="submitSourceContent()" class="submit-btn">Upload Content</button>
                    </div>
                </div>
            </form>
        </div>
        <div id="formResult" class="hidden">
            <h3>Content Uploaded!</h3>
            <pre id="resultJson"></pre>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function submitSourceContent() {
        // Source content form submission logic
        const form = document.getElementById('sourceContentForm');
        const formData = new FormData(form);
        
        // For demonstration purposes
        document.getElementById('formResult').classList.remove('hidden');
        document.getElementById('resultJson').textContent = JSON.stringify(Object.fromEntries(formData), null, 2);
    }
</script>
{% endblock %}
