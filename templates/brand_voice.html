
{% extends "base.html" %}

{% block title %}Create Brand Voice{% endblock %}

{% block content %}
<h2>Create Brand Voice</h2>
<div class="content-card">
    <div class="form-container">
        <div class="form-section">
        <h3>Define a brand's voice and communication style</h3>
        <form id="brandVoiceForm" class="standard-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="brandName">Brand Name</label>
                    <input type="text" id="brandName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="industryCategory">Industry Category</label>
                    <select id="industryCategory" class="form-control" required>
                        <option value="">Select an industry</option>
                        <option value="Technology">Technology</option>
                        <option value="Finance">Finance</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Education">Education</option>
                        <option value="Retail">Retail</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Food">Food & Beverage</option>
                        <option value="Travel">Travel & Hospitality</option>
                        <option value="Real Estate">Real Estate</option>
                        <option value="Automotive">Automotive</option>
                        <option value="Energy">Energy</option>
                        <option value="Manufacturing">Manufacturing</option>
                        <option value="Media">Media</option>
                        <option value="Professional Services">Professional Services</option>
                        <option value="Non-profit">Non-profit</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="targetAudience">Target Audience</label>
                <textarea id="targetAudience" class="form-control" rows="3" required placeholder="Describe the primary audience for this brand"></textarea>
            </div>
            <div class="form-group">
                <label for="brandPersonality">Brand Personality</label>
                <textarea id="brandPersonality" class="form-control" rows="5" required placeholder="Describe the brand's personality traits (e.g., professional, friendly, innovative, etc.)"></textarea>
            </div>
            <div class="form-group">
                <label for="toneOfVoice">Tone of Voice</label>
                <textarea id="toneOfVoice" class="form-control" rows="5" required placeholder="Describe how the brand should sound (e.g., casual, formal, authoritative, etc.)"></textarea>
            </div>
            <div class="form-group">
                <label for="languageGuidelines">Language Guidelines</label>
                <textarea id="languageGuidelines" class="form-control" rows="5" placeholder="Specific words, phrases, or language patterns to use or avoid"></textarea>
            </div>
            <div class="form-group">
                <label for="communicationGoals">Communication Goals</label>
                <textarea id="communicationGoals" class="form-control" rows="5" placeholder="What the brand aims to achieve through its communications"></textarea>
            </div>
            <div class="action-buttons">
                <button type="submit" class="submit-btn">Create Brand Voice</button>
            </div>
        </form>
    </div>
        <div id="formResult" class="hidden">
            <h3>Brand Voice Created!</h3>
            <pre id="resultJson"></pre>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('brandVoiceForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        // Add form submission logic here
    });
</script>
{% endblock %}
