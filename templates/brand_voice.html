
{% extends "base.html" %}

{% block title %}Create Brand Voice{% endblock %}

{% block content %}
<h2>Create Brand Voice</h2>
<div class="content-card wide">
    <div class="form-container">
        <div class="form-section">
            <h3>Define a brand's voice and communication style</h3>
            <form id="brandVoiceForm" class="standard-form">
                <div class="form-row">
                    <div class="form-col">
                        <label for="brandName">Brand Name:</label>
                        <input type="text" id="brandName" name="brandName" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="industryCategory">Industry Category:</label>
                        <input type="text" id="industryCategory" name="industryCategory" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="targetAudience">Target Audience:</label>
                        <textarea id="targetAudience" name="targetAudience" rows="3" required></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="brandPersonality">Brand Personality:</label>
                        <textarea id="brandPersonality" name="brandPersonality" rows="3" required></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="brandValues">Brand Values:</label>
                        <textarea id="brandValues" name="brandValues" rows="3" required></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="tonality">Tonality:</label>
                        <textarea id="tonality" name="tonality" rows="3" required></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label for="languageStyle">Language Style:</label>
                        <textarea id="languageStyle" name="languageStyle" rows="3" required></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <button type="button" onclick="submitBrandVoice()" class="submit-btn">Create Brand Voice</button>
                    </div>
                </div>
            </form>
        </div>
        <div id="formResult" class="hidden">
            <h3>Brand Voice Created!</h3>
            <pre id="resultJson"></pre>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function submitBrandVoice() {
        // Brand voice form submission logic
        const form = document.getElementById('brandVoiceForm');
        const formData = new FormData(form);
        
        // For demonstration purposes
        document.getElementById('formResult').classList.remove('hidden');
        document.getElementById('resultJson').textContent = JSON.stringify(Object.fromEntries(formData), null, 2);
    }
</script>
{% endblock %}
