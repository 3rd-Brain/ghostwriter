
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ghostwriter API</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon" style="margin: 0 auto;">G</div>
        </div>
        <h2 class="login-title">Login to Ghostwriter</h2>
        
        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="form-button">Sign In</button>
        </form>
        
        <div class="mt-lg" style="text-align: center;">
            <span>Don't have an account? <a href="/signup" style="color: var(--primary);">Sign Up</a></span>
        </div>
    </div>
</body>
</html>
